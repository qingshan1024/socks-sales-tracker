<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>袜子销售记账系统</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>袜子销售记账系统</h1>
        
        <div class="stats-section">
            <div class="stat-card">
                <h3>已售总数量</h3>
                <p class="stat-value" id="totalQuantity">0</p>
                <span class="stat-unit">双</span>
            </div>
            <div class="stat-card">
                <h3>总成交价</h3>
                <p class="stat-value" id="totalPrice">0.00</p>
                <span class="stat-unit">元</span>
            </div>
        </div>

        <div class="form-section">
            <h2>添加销售记录</h2>
            <form id="saleForm">
                <div class="form-group">
                    <label for="date">日期：</label>
                    <input type="date" id="date" required>
                </div>
                <div class="form-group">
                    <label for="quantity">数量（双）：</label>
                    <input type="number" id="quantity" min="1" required>
                </div>
                <div class="form-group">
                    <label for="price">价格（元）：</label>
                    <input type="number" id="price" min="0" step="0.01" required>
                </div>
                <button type="submit" class="btn-submit">添加记录</button>
            </form>
        </div>

        <div class="records-section">
            <h2>销售明细</h2>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>日期</th>
                            <th>数量（双）</th>
                            <th>价格（元）</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="recordsBody">
                    </tbody>
                </table>
            </div>
            <button id="clearAll" class="btn-clear">清空所有记录</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
